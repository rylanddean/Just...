name: JustEllipsis
options:
  bundleIdPrefix: com.rylandean
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  defaultConfig: Debug

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: "2.7.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:

  # ── Main App ─────────────────────────────────────────────────────────────
  JustEllipsis:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: JustEllipsis
      - path: Shared
    resources:
      - path: JustEllipsis/Assets.xcassets
    info:
      path: JustEllipsis/Info.plist
      properties:
        CFBundleName: "Just…"
        CFBundleDisplayName: "Just…"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        BGTaskSchedulerPermittedIdentifiers:
          - com.rylandean.justellipsis.prefetch
        UIBackgroundModes:
          - fetch
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Voice reflections are transcribed on-device. Audio never leaves your phone."
        NSSpeechRecognitionUsageDescription: "Speech recognition powers voice reflections. All recognition is on-device."
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: JustEllipsis/JustEllipsis.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rylandean.justellipsis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rylandean.justellipsis
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: SwiftSoup
      - target: JustEllipsisShareExtension   # embeds the extension in the app bundle

  # ── Share Extension ───────────────────────────────────────────────────────
  JustEllipsisShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: JustEllipsisShareExtension
      - path: Shared
    info:
      path: JustEllipsisShareExtension/Info.plist
      properties:
        CFBundleName: JustEllipsisShareExtension
        CFBundleDisplayName: "Just…"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    entitlements:
      path: JustEllipsisShareExtension/JustEllipsisShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rylandean.justellipsis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rylandean.justellipsis.shareextension
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
  # ── Unit Tests ────────────────────────────────────────────────────────────
  JustEllipsisTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: JustEllipsisTests
    info:
      path: JustEllipsisTests/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rylandean.justellipsistests
    dependencies:
      - target: JustEllipsis
        embed: false
