name: JustEllipsis
options:
  bundleIdPrefix: com.rylandean
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  defaultConfig: Debug

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: "2.7.0"
  FeedKit:
    url: https://github.com/nmdias/FeedKit
    from: "9.1.2"

configs:
  Debug: debug
  Release: release

schemes:
  JustEllipsis:
    build:
      targets:
        JustEllipsis: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - JustEllipsisTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  JustEllipsisMac:
    build:
      targets:
        JustEllipsisMac: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  JustEllipsisShareExtension:
    build:
      targets:
        JustEllipsisShareExtension: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:

  # ── Main App ─────────────────────────────────────────────────────────────
  JustEllipsis:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: JustEllipsis
      - path: Shared
    resources:
      - path: JustEllipsis/Assets.xcassets
      - path: JustEllipsis/Resources
    info:
      path: JustEllipsis/Info.plist
      properties:
        CFBundleName: "Just…"
        CFBundleDisplayName: "Just…"
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.rylandean.justellipsis.rss-feed
            UTTypeDescription: RSS Feed
            UTTypeConformsTo:
              - public.xml
              - public.data
            UTTypeTagSpecification:
              public.mime-type:
                - application/rss+xml
                - application/x-rss+xml
              public.filename-extension:
                - rss
          - UTTypeIdentifier: com.rylandean.justellipsis.atom-feed
            UTTypeDescription: Atom Feed
            UTTypeConformsTo:
              - public.xml
              - public.data
            UTTypeTagSpecification:
              public.mime-type:
                - application/atom+xml
              public.filename-extension:
                - atom
        CFBundleDocumentTypes:
          - CFBundleTypeName: RSS Feed
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.rylandean.justellipsis.rss-feed
          - CFBundleTypeName: Atom Feed
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.rylandean.justellipsis.atom-feed
        CFBundleURLTypes:
          - CFBundleTypeRole: Viewer
            CFBundleURLName: com.rylandean.justellipsis.feed
            CFBundleURLSchemes:
              - feed
              - feeds
          - CFBundleTypeRole: Viewer
            CFBundleURLName: com.rylandean.justellipsis.deeplink
            CFBundleURLSchemes:
              - justellipsis
              - just
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        BGTaskSchedulerPermittedIdentifiers:
          - com.rylandean.justellipsis.prefetch
          - com.rylandean.justellipsis.rssfetch
          - com.rylandean.justellipsis.grading
        UIBackgroundModes:
          - fetch
          - processing
          - remote-notification
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Voice reflections are transcribed on-device. Audio never leaves your phone."
        NSSpeechRecognitionUsageDescription: "Speech recognition powers voice reflections. All recognition is on-device."
        NSHealthShareUsageDescription: "Activity ring progress appears once you've met your daily reading goal — a quiet reminder to also move."
        NSLocationWhenInUseUsageDescription: "Just… uses your location once a day to show today's weather in the Digest. It is never stored or shared."
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: false
        UIDeviceFamily:
          - 1
          - 2
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: JustEllipsis/JustEllipsis.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rylandean.justellipsis
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.rylandean.justellipsis
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.rylandean.justellipsis
        aps-environment: development
        com.apple.developer.healthkit: true
        com.apple.developer.weatherkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rylandean.justellipsis
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: SwiftSoup
      - package: FeedKit
      - sdk: HealthKit.framework
      - sdk: WeatherKit.framework
      - sdk: CoreLocation.framework
      - target: JustEllipsisShareExtension   # embeds the extension in the app bundle

  # ── Share Extension ───────────────────────────────────────────────────────
  JustEllipsisShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: JustEllipsisShareExtension
      - path: Shared
      # SwiftData models needed to write QueuedLink directly into the shared
      # SQLite store so CloudKit can pick it up without requiring an app open.
      - path: JustEllipsis/Models/QueuedLink.swift
      - path: JustEllipsis/Models/BrainEntry.swift
      - path: JustEllipsis/Models/ReadingDay.swift
      - path: JustEllipsis/Models/RSSFeed.swift
    info:
      path: JustEllipsisShareExtension/Info.plist
      properties:
        CFBundleName: JustEllipsisShareExtension
        CFBundleDisplayName: "Just…"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    entitlements:
      path: JustEllipsisShareExtension/JustEllipsisShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rylandean.justellipsis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rylandean.justellipsis.shareextension
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
  # ── Unit Tests ────────────────────────────────────────────────────────────
  JustEllipsisTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: JustEllipsisTests
    info:
      path: JustEllipsisTests/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rylandean.justellipsistests
    dependencies:
      - target: JustEllipsis
        embed: false

  # ── Mac Companion App ─────────────────────────────────────────────────────
  # Note: JustEllipsisSafariExtension must be added manually in Xcode
  # (XcodeGen does not support the safari-web-extension product type).
  # See SAFARI_EXTENSION_SETUP.md for instructions.
  JustEllipsisMac:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: JustEllipsisMac
      # CloudKitLinkWriter is owned by the Safari extension but shared here
      # so LocalLinkServer.swift resolves the symbol at compile time.
      - path: JustEllipsisSafariExtension/CloudKitLinkWriter.swift
    info:
      path: JustEllipsisMac/Info.plist
      properties:
        CFBundleName: "Just…"
        CFBundleDisplayName: "Just…"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSUIElement: true
    entitlements:
      path: JustEllipsisMac/JustEllipsisMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.rylandean.justellipsis
        com.apple.developer.icloud-services:
          - CloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rylandean.justellipsis.mac
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
